---
layout: default
title: Home
banner: false
---

<section class="two page primary-bg-color">
  <div class="primary page">
    <div class="center-vbox">
      <img class="main-logo main-default-margin" src="/assets/gensi-bv.svg">
      <div class="main-gallery main-gallery-default">
        {% for idx in (0..9) %}
        <img class="main-gallery-item" src="/assets/main-pics/line{{idx}}.png">
        {% endfor %}
      </div>
      <h1 class="main-page-content" data-i18n="main:page"></h1>
    </div>
  </div>
  <div class="fit-page center-vbox main-overview">
    <img class="main-overview-img" src="/assets/main-pics/main-overview.png">
    <div class="main-page-content" data-i18n="main:intro"></div>
  </div>
</section>


{% for block in site.data.blocks %}
{% include main_block.html block=block %}
{% endfor %}
