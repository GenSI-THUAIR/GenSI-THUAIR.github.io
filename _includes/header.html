<section class="header">

      <a href="{{ site.baseurl }}/"><img class="u-max-full-width" src='{{ site.data.gensi.logo }}'></a>
    </div>
    <div class="nine columns main-description">
        <h1>{{ site.data.gensi.name }}</h1>
        <p>{{ site.data.gensi.title }}</p>
        <p>{{ site.data.gensi.affiliation }}</p>
        <br/>
        <p>Slogan: {{ site.data.gensi.slogan }}</p>
    </div>
  </div>
</section>
