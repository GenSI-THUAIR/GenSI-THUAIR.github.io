<div class="footer dark-bg-color">
  <div class="footer-logo-box">
    <a href="/">
      <img src="/assets/gensi-wh.svg" alt="Logo">
    </a>
  </div>
  <div class="footer-block footer-address">
    <div class="footer-title" data-i18n="footer:addr-title"></div>
    <div class="text" data-i18n="footer:address"></div>
  </div>
  <div class="footer-block">
    <div class="footer-title" data-i18n="footer:follow"></div>
    <div class="footer-media">
      <ul class="footer-links">
        {% for media in site.data.media %}
        <li>
          {% if media.link %}
          <a href="{{ media.link | default: '#' }}"
          target="_blank" class="footer-media-item"><img src="{{ media.icon | prepend: '/assets/media-pics/' }}">
          </a>
          {% else %}
          <div style="opacity: 0;">{{ media.name }}</div>
          {% endif %}
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
  <div class="footer-block">
    <a style="text-decoration: none;" href="/about.html#sec-contact">
      <div style="display: flex; align-items: center;" class="footer-title">
        <div class="footer-contact" data-i18n="footer:contact"></div>
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.66658 10L7.49992 8.79167L10.4583 5.83333H0.333252V4.16667H10.4583L7.49992 1.20833L8.66658 0L13.6666 5L8.66658 10Z" fill="#D7FF39"/>
        </svg>
      </div>
    </a>
  </div>
</div>
