<section id="sec-projects">
  {% include common_title.html title="Projects" %}
  
  <div class="project-container">
    {% for project in site.data.projects %}
    <div class="project-content">
      <!-- title, thumb -->
        <div class="project-item">
          <img src="{{ project.thumb }}" alt="{{ project.title}}" class="project-image">
          <p class="project-description text">{{ project.title }}</p>
        </div>
    </div>
    {% endfor %}
  </div>
</section>
