---
layout: singleton
marker: blog
title: Blog
permalink: /blog.html
---
<h3 class="text-center">Posts from GenSI</h3>

<div id="blog-gallery" class="blog-container">
  <div style="border-top: 2px solid var(--primary-color);"></div>
  {% for page in site.blogs %}
  {% if page.hide != true %}
  <a class="navbar-link-base" href="{{ page.url }}">
    <div class="blog-item">
      <h4 class="blog-title">{{ page.title }}</h4>
      <div class="blog-create">
        <div class="blog-author">{{ page.author | default: "Anonymous" }}</div>
        <div class="blog-date">{{ page.time | default: "Unknown Date" }}</div>
      </div>
    </div>
  </a>
  {% endif %}
  {% endfor %}
</div>
