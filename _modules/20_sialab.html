---
layout: default
marker: sialab
title: SIA-Lab
permalink: /sialab.html
---

<section id="sialab-sec-new">
  <div class="container">
    <h3 class="text" data-i18n="sialab:news-title"></h3>
    <div class="news-block">
      {% for piece in site.data.sialab.news limit: 3 %}
      <div class="news-item">
        <p class="news-date" data-i18n="{{piece.key}}-date"></p>
        {% if piece.link %}
        <a href="{{piece.link}}" style="text-decoration: none; color: inherit;">
          {% endif %}
          <p class="news-title" data-i18n="{{piece.key}}"></p>
          {% if piece.link %}
        </a>
        {% endif %}
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<section id="sialab-sec-project">
  <div class="container">
    <h3 class="text" data-i18n="sialab:proj-title"></h3>
  </div>
</section>
