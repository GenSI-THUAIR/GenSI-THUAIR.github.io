---
layout: singleton
marker: contact
title: Contact
permalink: /contact.html
---

<section class="contact-container">
  <h1 class="contact-title">Contact</h1>
  <p class="contact-prompt">Feel free to contact us</p>
  <div class="contact-block">
    <div class="contact-input-block">
      <div class="contact-name">
        <input class="contact-input" type="text" placeholder="First Name">
        <input class="contact-input" type="text" placeholder="Last Name">
      </div>
      <div class="contact-email">
        <input class="contact-input" type="email" placeholder="Email Address">
      </div>
      <div class="contact-message">
        <input class="contact-input" type="text" placeholder="Message">
      </div>
    </div>

    <div class="contact-info-block">
      <div class="contact-info-title">Professor</div>
      <div class="contact-info-name">Hao Zhou</div>
      <div><a class="contact-info-email" href="mailto:{{site.data.profile.email}}">{{site.data.profile.email}}</a></div>
      <br>
      <div class="contact-info-title"></div>
      <div class="contact-info-name">GenSI Official Email</div>
      <div><a class="contact-info-email" href="mailto:{{site.data.profile.email}}">gen_si@163.com</a></div>
    </div>
  </div>
  <button class="contact-submit-btn">Submit</button>
</section>
