  <script>
    // Redirect legacy hash-mode URLs (e.g. /#/portal/blogdetail?id=3) to history-mode equivalents
    (function () {
      var hash = window.location.hash;
      if (hash && hash.startsWith('#/')) {
        var raw = hash.slice(1); // "/portal/blogdetail?id=3"
        var qIndex = raw.indexOf('?');
        var path = qIndex >= 0 ? raw.slice(0, qIndex) : raw;
        var search = qIndex >= 0 ? raw.slice(qIndex) : '';
        var params = new URLSearchParams(search);

        // /portal/blogdetail?id=X -> /portal/blogdetail/X
        if (path === '/portal/blogdetail' && params.has('id')) {
          var id = params.get('id');
          params.delete('id');
          path = '/portal/blogdetail/' + id;
        }

        var remaining = params.toString();
        var newUrl = path + (remaining ? '?' + remaining : '');
        window.location.replace(newUrl);
      }
    })();
  </script>
